# Fork-local workflow for comparing long-running fuzz modes side by side.
name: Compare Long Fuzz Modes rust-bitcoin
run-name: >-
  Compare Long Fuzz Modes: ${{ github.event.inputs.targets || 'bitcoin_arbitrary_psbt' }}
  / corpus=${{ github.event.inputs.corpus_start_mode || 'seed' }}
  / ${{ github.event.inputs.stop_mode || 'seconds' }}=${{ github.event.inputs.stop_value || '19200' }}
  / runs=${{ github.event.inputs.run_count || '1' }}

on:
  workflow_dispatch:
    inputs:
      stop_mode:
        description: 'Stop condition for each fuzz job'
        required: false
        default: 'seconds'
        type: choice
        options:
          - seconds
          - runs
      stop_value:
        description: 'Stop value per fuzz job. For example 100 seconds or 100 runs.'
        required: false
        default: '19200'
        type: string
      run_count:
        description: 'How many runs to queue. New jobs start as slots clear.'
        required: false
        default: '1'
        type: string
      base_seed:
        description: 'Base libFuzzer seed. Run N uses base_seed + N - 1.'
        required: false
        default: '1'
        type: string
      corpus_start_mode:
        description: 'Start each run from the canonical seed corpus or from empty.'
        required: false
        default: 'seed'
        type: choice
        options:
          - seed
          - empty
      auto_promote_corpus:
        description: 'Automatically trigger corpus promotion after the compare run.'
        required: false
        default: false
        type: boolean
      promotion_branch:
        description: 'Branch used to store canonical corpora when auto-promote is enabled.'
        required: false
        default: 'fuzz-corpora'
        type: string
      targets:
        description: 'Comma-separated target list. Defaults to bitcoin_arbitrary_psbt.'
        required: false
        default: 'bitcoin_arbitrary_psbt'
        type: string

permissions: {}

concurrency:
  group: fork-long-fuzz-compare
  cancel-in-progress: false

jobs:
  discover:
    if: ${{ github.repository == 'i-a-m-d/rust-bitcoin' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      target_count: ${{ steps.targets.outputs.target_count }}
      stop_mode: ${{ steps.config.outputs.stop_mode }}
      stop_value: ${{ steps.config.outputs.stop_value }}
      base_seed: ${{ steps.config.outputs.base_seed }}
      corpus_start_mode: ${{ steps.config.outputs.corpus_start_mode }}
      run_count: ${{ steps.config.outputs.run_count }}
      tested_commit: ${{ steps.commit.outputs.tested_commit }}
      tested_commit_url: ${{ steps.commit.outputs.tested_commit_url }}
      matrix_entries: ${{ steps.plan.outputs.matrix_entries }}
      matrix_size: ${{ steps.plan.outputs.matrix_size }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: rust-bitcoin/rust-bitcoin
          ref: master
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          toolchain: '1.74.0'
      - name: Install cargo-fuzz
        run: cargo install --force --locked --version 0.12.0 cargo-fuzz
      - id: config
        run: |
          echo "stop_mode=${{ github.event.inputs.stop_mode || 'seconds' }}" >> "$GITHUB_OUTPUT"
          echo "stop_value=${{ github.event.inputs.stop_value || '19200' }}" >> "$GITHUB_OUTPUT"
          echo "base_seed=${{ github.event.inputs.base_seed || '1' }}" >> "$GITHUB_OUTPUT"
          echo "corpus_start_mode=${{ github.event.inputs.corpus_start_mode || 'seed' }}" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          count = int("${{ github.event.inputs.run_count || '1' }}")
          if count < 1:
              raise SystemExit("run_count must be >= 1")
          print(f"run_count={count}")
          PY
      - id: commit
        run: |
          sha="$(git rev-parse HEAD)"
          echo "tested_commit=$sha" >> "$GITHUB_OUTPUT"
          echo "tested_commit_url=https://github.com/rust-bitcoin/rust-bitcoin/commit/$sha" >> "$GITHUB_OUTPUT"
      - id: targets
        env:
          TARGET_FILTER: ${{ github.event.inputs.targets || 'bitcoin_arbitrary_psbt' }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import pathlib
          import subprocess

          repo = pathlib.Path('.').resolve()
          output = subprocess.check_output(['cargo', 'fuzz', 'list'], cwd=repo / 'fuzz', text=True)
          targets = [line.strip() for line in output.splitlines() if line.strip()]

          raw_filter = os.environ.get('TARGET_FILTER', '').strip()
          if raw_filter:
              wanted = [item.strip() for item in raw_filter.split(',') if item.strip()]
              missing = [item for item in wanted if item not in targets]
              if missing:
                  raise SystemExit(f'Unknown fuzz targets requested: {missing}')
              targets = wanted

          print(f"fuzz_targets={json.dumps(targets)}")
          print(f"target_count={len(targets)}")
          PY
      - id: plan
        env:
          FUZZ_TARGETS_JSON: ${{ steps.targets.outputs.fuzz_targets }}
          RUN_COUNT: ${{ steps.config.outputs.run_count }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import math
          import os

          mode_ids = [1, 2, 3, 4]
          max_matrix_entries = 256

          targets = json.loads(os.environ['FUZZ_TARGETS_JSON'])
          run_count = int(os.environ['RUN_COUNT'])

          target_mode_count = len(targets) * len(mode_ids)
          if target_mode_count < 1:
              raise SystemExit('no targets to schedule')

          max_batches = max_matrix_entries // target_mode_count
          if max_batches < 1:
              raise SystemExit(
                  f'too many target/mode combinations: {target_mode_count} exceeds max matrix capacity {max_matrix_entries}'
              )

          batch_count = min(run_count, max_batches)
          entries = []
          for target in targets:
              for mode_id in mode_ids:
                  for batch_index in range(1, batch_count + 1):
                      run_indexes = list(range(batch_index, run_count + 1, batch_count))
                      entries.append({
                          'fuzz_target': target,
                          'mode_id': mode_id,
                          'batch_index': batch_index,
                          'run_indexes': run_indexes,
                      })

          print(f"matrix_entries={json.dumps(entries)}")
          print(f"matrix_size={len(entries)}")
          PY

  fuzz:
    if: ${{ github.repository == 'i-a-m-d/rust-bitcoin' }}
    needs: discover
    runs-on: ubuntu-24.04
    timeout-minutes: 345
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix_entries) }}
    env:
      RUST_BACKTRACE: '1'
      FUZZ_NIGHTLY: 'nightly-2026-03-27'
      CORPUS_BRANCH: 'fuzz-corpora'
      CORPUS_START_MODE: ${{ needs.discover.outputs.corpus_start_mode }}
      STOP_MODE: ${{ needs.discover.outputs.stop_mode }}
      STOP_VALUE: ${{ needs.discover.outputs.stop_value }}
      BASE_SEED: ${{ needs.discover.outputs.base_seed }}
      TESTED_COMMIT: ${{ needs.discover.outputs.tested_commit }}
      TESTED_COMMIT_URL: ${{ needs.discover.outputs.tested_commit_url }}
    steps:
      - name: Install test dependencies
        run: sudo apt-get update -y && sudo apt-get install -y binutils-dev libunwind8-dev libcurl4-openssl-dev libelf-dev libdw-dev cmake gcc libiberty-dev
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: rust-bitcoin/rust-bitcoin
          ref: master
          persist-credentials: false
      - uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: |
            ~/.cargo/bin
            fuzz/target
            target
          key: fork-long-fuzz-compare-build-${{ runner.os }}-${{ env.FUZZ_NIGHTLY }}-${{ hashFiles('**/Cargo.toml','**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          toolchain: nightly-2026-03-27
      - name: Fetch canonical corpus branch
        if: ${{ env.CORPUS_START_MODE == 'seed' }}
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          repo_url="${{ github.server_url }}/${REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$repo_url" "$CORPUS_BRANCH" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$CORPUS_BRANCH" "$repo_url" corpus-store
          else
            mkdir -p corpus-store/corpus
          fi
      - name: Run long fuzz target comparison mode
        run: |
          set -euo pipefail
          cargo install --force --locked --version 0.12.0 cargo-fuzz

          target="${{ matrix.fuzz_target }}"
          mode_id="${{ matrix.mode_id }}"
          batch_index="${{ matrix.batch_index }}"
          run_indexes_json='${{ toJson(matrix.run_indexes) }}'
          upload_root="$GITHUB_WORKSPACE/long-fuzz-upload/$target/mode-$mode_id/batch-$batch_index"
          meta_upload_root="$GITHUB_WORKSPACE/long-fuzz-meta/$target/mode-$mode_id/batch-$batch_index"
          mkdir -p "$upload_root/long-fuzz-result/$target/mode-$mode_id"
          mkdir -p "$upload_root/long-fuzz-corpus/$target/mode-$mode_id"
          mkdir -p "$meta_upload_root/long-fuzz-meta/$target/mode-$mode_id"

          case "$mode_id" in
            1)
              mode_name="real"
              mode_slug="real"
              rustflags=""
              ;;
            2)
              mode_name="secp256k1_fuzz"
              mode_slug="secp256k1-fuzz"
              rustflags="--cfg=secp256k1_fuzz"
              ;;
            3)
              mode_name="hashes_fuzz+secp256k1_fuzz"
              mode_slug="hashes-fuzz-secp256k1-fuzz"
              rustflags="--cfg=hashes_fuzz --cfg=secp256k1_fuzz"
              ;;
            4)
              mode_name="hashes_fuzz"
              mode_slug="hashes-fuzz"
              rustflags="--cfg=hashes_fuzz"
              ;;
            *)
              echo "unknown mode_id=$mode_id" >&2
              exit 1
              ;;
          esac

          canonical_seed_dir="$GITHUB_WORKSPACE/corpus-store/corpus/$target/$mode_slug/seed"

          while IFS= read -r run_index; do
            effective_seed="$((BASE_SEED + run_index - 1))"
            result_root="$GITHUB_WORKSPACE/long-fuzz-result/$target/mode-$mode_id/run-$run_index"
            corpus_dir="$GITHUB_WORKSPACE/long-fuzz-corpus/$target/mode-$mode_id/run-$run_index"
            mkdir -p "$result_root"
            mkdir -p "$corpus_dir"

            seed_file_count=0
            seed_source="empty"
            if [[ "$CORPUS_START_MODE" == "seed" && -d "$canonical_seed_dir" ]]; then
              seed_file_count="$(find "$canonical_seed_dir" -type f | wc -l | tr -d ' ')"
              if [[ "$seed_file_count" != "0" ]]; then
                cp -R "$canonical_seed_dir"/. "$corpus_dir"/
                seed_source="$CORPUS_BRANCH"
              fi
            fi

            fuzz_args=("-print_final_stats=1" "-seed=${effective_seed}")
            case "$STOP_MODE" in
              seconds)
                fuzz_args+=("-max_total_time=${STOP_VALUE}")
                ;;
              runs)
                fuzz_args+=("-runs=${STOP_VALUE}")
                ;;
              *)
                echo "unknown STOP_MODE=$STOP_MODE" >&2
                exit 1
                ;;
            esac

            start_ts="$(date +%s)"
            status="success"

            rm -rf "fuzz/artifacts/$target"

            pushd fuzz >/dev/null
            if [[ -n "$rustflags" ]]; then
              env RUSTFLAGS="$rustflags" cargo +${FUZZ_NIGHTLY} fuzz run "$target" "$corpus_dir" -- "${fuzz_args[@]}" > "$result_root/run.log" 2>&1 || status="failure"
            else
              cargo +${FUZZ_NIGHTLY} fuzz run "$target" "$corpus_dir" -- "${fuzz_args[@]}" > "$result_root/run.log" 2>&1 || status="failure"
            fi
            popd >/dev/null

            end_ts="$(date +%s)"
            duration_s="$((end_ts - start_ts))"
            metrics_json="$(python3 - "$result_root/run.log" <<'PY'
          import json
          import pathlib
          import re
          import sys

          log_path = pathlib.Path(sys.argv[1])
          text = log_path.read_text(errors='replace')

          def last_int(pattern):
              matches = re.findall(pattern, text)
              return int(matches[-1]) if matches else None

          def last_text(pattern):
              matches = re.findall(pattern, text)
              return matches[-1] if matches else None

          done = re.findall(r"Done\s+([0-9]+)\s+runs\s+in\s+([0-9]+)\s+second\(s\)", text)

          payload = {
              "completed_runs": int(done[-1][0]) if done else None,
              "fuzz_duration_s": int(done[-1][1]) if done else None,
              "final_cov": last_int(r"\bcov:\s*([0-9]+)"),
              "final_ft": last_int(r"\bft:\s*([0-9]+)"),
              "final_exec_per_sec": last_int(r"\bexec/s:\s*([0-9]+)"),
              "final_rss_mb": last_int(r"\brss:\s*([0-9]+)Mb"),
              "final_corpus_count": last_int(r"\bcorp:\s*([0-9]+)"),
              "final_corpus_size": last_text(r"\bcorp:\s*[0-9]+/([^\s]+)"),
          }
          print(json.dumps(payload))
          PY
            )"
            completed_runs="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("completed_runs") or ""))' "$metrics_json")"
            final_cov="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_cov") or ""))' "$metrics_json")"
            final_ft="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_ft") or ""))' "$metrics_json")"
            final_exec_per_sec="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_exec_per_sec") or ""))' "$metrics_json")"
            final_rss_mb="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_rss_mb") or ""))' "$metrics_json")"
            final_corpus_count="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_corpus_count") or ""))' "$metrics_json")"
            final_corpus_size="$(python3 -c 'import json,sys; print((json.loads(sys.argv[1]).get("final_corpus_size") or ""))' "$metrics_json")"

            artifact_count=0
            if [[ -d "fuzz/artifacts/$target" ]]; then
              mkdir -p "$result_root/artifacts"
              cp -R "fuzz/artifacts/$target" "$result_root/artifacts/"
              artifact_count="$(find "fuzz/artifacts/$target" -type f | wc -l | tr -d ' ')"
            fi

            export TARGET_NAME="$target"
            export MODE_ID="$mode_id"
            export MODE_NAME="$mode_name"
            export RUN_INDEX="$run_index"
            export RESULT_ROOT="$result_root"
            export FUZZ_STATUS="$status"
            export DURATION_S="$duration_s"
            export COMPLETED_RUNS="$completed_runs"
            export FINAL_COV="$final_cov"
            export FINAL_FT="$final_ft"
            export FINAL_EXEC_PER_SEC="$final_exec_per_sec"
            export FINAL_RSS_MB="$final_rss_mb"
            export FINAL_CORPUS_COUNT="$final_corpus_count"
            export FINAL_CORPUS_SIZE="$final_corpus_size"
            export RUSTFLAGS_USED="$rustflags"
            export ARTIFACT_COUNT="$artifact_count"
            export FUZZ_SEED_USED="$effective_seed"
            export RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            export JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            export METRICS_JSON="$metrics_json"
            export CORPUS_MODE_SLUG="$mode_slug"
            export CORPUS_START_MODE_USED="$CORPUS_START_MODE"
            export SEED_BRANCH_USED="$CORPUS_BRANCH"
            export SEED_FILE_COUNT="$seed_file_count"
            export SEED_SOURCE="$seed_source"

            python3 - <<'PY'
          import json
          import os
          import pathlib

          result_root = pathlib.Path(os.environ['RESULT_ROOT'])
          metrics = json.loads(os.environ['METRICS_JSON'])
          payload = {
              'target': os.environ['TARGET_NAME'],
              'mode_id': int(os.environ['MODE_ID']),
              'mode_name': os.environ['MODE_NAME'],
              'run_index': int(os.environ['RUN_INDEX']),
              'status': os.environ['FUZZ_STATUS'],
              'job_duration_s': int(os.environ['DURATION_S']),
              'fuzz_duration_s': metrics.get('fuzz_duration_s'),
              'completed_runs': int(os.environ['COMPLETED_RUNS']) if os.environ['COMPLETED_RUNS'] else None,
              'stop_mode': os.environ['STOP_MODE'],
              'stop_value': int(os.environ['STOP_VALUE']),
              'seed': int(os.environ['FUZZ_SEED_USED']) if os.environ['FUZZ_SEED_USED'] else None,
              'tested_commit': os.environ['TESTED_COMMIT'],
              'tested_commit_url': os.environ['TESTED_COMMIT_URL'],
              'mode_slug': os.environ['CORPUS_MODE_SLUG'],
              'corpus_start_mode': os.environ['CORPUS_START_MODE_USED'],
              'seed_branch': os.environ['SEED_BRANCH_USED'],
              'seed_file_count': int(os.environ['SEED_FILE_COUNT']) if os.environ['SEED_FILE_COUNT'] else 0,
              'seed_source': os.environ['SEED_SOURCE'],
              'final_cov': int(os.environ['FINAL_COV']) if os.environ['FINAL_COV'] else None,
              'final_ft': int(os.environ['FINAL_FT']) if os.environ['FINAL_FT'] else None,
              'final_exec_per_sec': int(os.environ['FINAL_EXEC_PER_SEC']) if os.environ['FINAL_EXEC_PER_SEC'] else None,
              'final_rss_mb': int(os.environ['FINAL_RSS_MB']) if os.environ['FINAL_RSS_MB'] else None,
              'final_corpus_count': int(os.environ['FINAL_CORPUS_COUNT']) if os.environ['FINAL_CORPUS_COUNT'] else None,
              'final_corpus_size': os.environ['FINAL_CORPUS_SIZE'] or None,
              'rustflags': os.environ['RUSTFLAGS_USED'],
              'artifact_count': int(os.environ['ARTIFACT_COUNT']),
              'run_url': os.environ['RUN_URL'],
              'job_url': os.environ['JOB_URL'],
          }
          (result_root / 'meta.json').write_text(json.dumps(payload, indent=2, sort_keys=True))
          PY

            cp -R "$result_root" "$upload_root/long-fuzz-result/$target/mode-$mode_id/"
            cp -R "$corpus_dir" "$upload_root/long-fuzz-corpus/$target/mode-$mode_id/"
            mkdir -p "$meta_upload_root/long-fuzz-meta/$target/mode-$mode_id/run-$run_index"
            cp "$result_root/meta.json" "$meta_upload_root/long-fuzz-meta/$target/mode-$mode_id/run-$run_index/meta.json"
          done < <(python3 - <<'PY' "$run_indexes_json"
          import json
          import sys

          for value in json.loads(sys.argv[1]):
              print(value)
          PY
          )
      - name: Upload per-target results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: long-fuzz-compare-data-${{ matrix.fuzz_target }}-mode-${{ matrix.mode_id }}-batch-${{ matrix.batch_index }}
          path: |
            long-fuzz-upload/${{ matrix.fuzz_target }}/mode-${{ matrix.mode_id }}/batch-${{ matrix.batch_index }}/long-fuzz-result
            long-fuzz-upload/${{ matrix.fuzz_target }}/mode-${{ matrix.mode_id }}/batch-${{ matrix.batch_index }}/long-fuzz-corpus
          if-no-files-found: warn
      - name: Upload per-target metadata
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: long-fuzz-compare-meta-${{ matrix.fuzz_target }}-mode-${{ matrix.mode_id }}-batch-${{ matrix.batch_index }}
          path: |
            long-fuzz-meta/${{ matrix.fuzz_target }}/mode-${{ matrix.mode_id }}/batch-${{ matrix.batch_index }}/long-fuzz-meta
          if-no-files-found: warn

  summarize:
    if: ${{ always() && github.repository == 'i-a-m-d/rust-bitcoin' }}
    needs: [discover, fuzz]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: long-fuzz-download
          pattern: long-fuzz-compare-meta-*
      - name: Build comparison summary reports
        run: |
          python3 - <<'PY'
          from collections import defaultdict
          import json
          import pathlib

          root = pathlib.Path('long-fuzz-download')
          rows = []
          for meta_path in sorted(root.rglob('meta.json')):
              data = json.loads(meta_path.read_text())
              rows.append(data)

          rows.sort(key=lambda row: (row.get('target', ''), row.get('run_index', 0), row.get('mode_id', 0)))

          summary_tsv = root / 'summary.tsv'
          with summary_tsv.open('w') as f:
              f.write('target\trun_index\tmode_id\tmode_name\tstatus\tcompleted_runs\tjob_duration_s\tfuzz_duration_s\tstop_mode\tstop_value\tseed\tfinal_cov\tfinal_ft\tfinal_corpus_count\tfinal_corpus_size\tfinal_exec_per_sec\tfinal_rss_mb\ttested_commit\ttested_commit_url\trustflags\tartifact_count\trun_url\tjob_url\n')
              for row in rows:
                  f.write(
                      f"{row.get('target','')}\t{row.get('run_index','')}\t{row.get('mode_id','')}\t{row.get('mode_name','')}\t{row.get('status','')}\t"
                      f"{row.get('completed_runs','')}\t{row.get('job_duration_s','')}\t{row.get('fuzz_duration_s','')}\t{row.get('stop_mode','')}\t{row.get('stop_value','')}\t{row.get('seed','')}\t"
                      f"{row.get('final_cov','')}\t{row.get('final_ft','')}\t{row.get('final_corpus_count','')}\t{row.get('final_corpus_size','')}\t"
                      f"{row.get('final_exec_per_sec','')}\t{row.get('final_rss_mb','')}\t{row.get('tested_commit','')}\t{row.get('tested_commit_url','')}\t"
                      f"{row.get('rustflags','')}\t{row.get('artifact_count','')}\t{row.get('run_url','')}\t{row.get('job_url','')}\n"
                  )

          def rank_desc(items, key):
              ranked = sorted(items, key=key, reverse=True)
              result = {}
              last_value = None
              last_rank = 0
              for index, item in enumerate(ranked, start=1):
                  value = key(item)
                  if last_value is None or value != last_value:
                      last_rank = index
                      last_value = value
                  result[item['mode_id']] = last_rank
              return result

          def fmt_float(value):
              if value is None:
                  return ''
              return f"{value:.2f}"

          mode_groups = defaultdict(list)
          for row in rows:
              mode_groups[(row.get('target'), row.get('mode_id'))].append(row)

          overview = []
          for (target, mode_id), group in sorted(mode_groups.items()):
              def average(field):
                  values = [row.get(field) for row in group if row.get(field) is not None]
                  if not values:
                      return None
                  return sum(values) / len(values)

              overview.append({
                  'target': target,
                  'mode_id': mode_id,
                  'mode_name': group[0].get('mode_name', ''),
                  'successful_jobs': sum(1 for row in group if row.get('status') == 'success'),
                  'failed_jobs': sum(1 for row in group if row.get('status') != 'success'),
                  'avg_job_duration_s': average('job_duration_s'),
                  'avg_fuzz_duration_s': average('fuzz_duration_s'),
                  'avg_final_ft': average('final_ft'),
                  'avg_final_cov': average('final_cov'),
                  'avg_final_corpus_count': average('final_corpus_count'),
                  'avg_final_exec_per_sec': average('final_exec_per_sec'),
              })

          overview_by_target = defaultdict(list)
          for item in overview:
              overview_by_target[item['target']].append(item)

          for target, items in overview_by_target.items():
              ft_rank = rank_desc(items, lambda item: item['avg_final_ft'] if item['avg_final_ft'] is not None else float('-inf'))
              cov_rank = rank_desc(items, lambda item: item['avg_final_cov'] if item['avg_final_cov'] is not None else float('-inf'))
              corpus_rank = rank_desc(items, lambda item: item['avg_final_corpus_count'] if item['avg_final_corpus_count'] is not None else float('-inf'))
              exec_rank = rank_desc(items, lambda item: item['avg_final_exec_per_sec'] if item['avg_final_exec_per_sec'] is not None else float('-inf'))

              for item in items:
                  item['ft_rank'] = ft_rank[item['mode_id']]
                  item['cov_rank'] = cov_rank[item['mode_id']]
                  item['corpus_rank'] = corpus_rank[item['mode_id']]
                  item['exec_rank'] = exec_rank[item['mode_id']]
                  item['overall_rank_score'] = item['ft_rank'] + item['cov_rank'] + item['corpus_rank'] + item['exec_rank']

              overall_rank = rank_desc(items, lambda item: -item['overall_rank_score'])
              for item in items:
                  item['overall_rank'] = overall_rank[item['mode_id']]

          overview_tsv = root / 'overview.tsv'
          with overview_tsv.open('w') as f:
              f.write('target\tmode_id\tmode_name\tsuccessful_jobs\tfailed_jobs\tavg_job_duration_s\tavg_fuzz_duration_s\tavg_final_ft\tft_rank\tavg_final_cov\tcov_rank\tavg_final_corpus_count\tcorpus_rank\tavg_final_exec_per_sec\texec_rank\toverall_rank_score\toverall_rank\n')
              for item in sorted(overview, key=lambda entry: (entry['target'], entry['overall_rank'], entry['mode_id'])):
                  f.write(
                      f"{item['target']}\t{item['mode_id']}\t{item['mode_name']}\t{item['successful_jobs']}\t{item['failed_jobs']}\t"
                      f"{fmt_float(item['avg_job_duration_s'])}\t{fmt_float(item['avg_fuzz_duration_s'])}\t"
                      f"{fmt_float(item['avg_final_ft'])}\t{item['ft_rank']}\t"
                      f"{fmt_float(item['avg_final_cov'])}\t{item['cov_rank']}\t"
                      f"{fmt_float(item['avg_final_corpus_count'])}\t{item['corpus_rank']}\t"
                      f"{fmt_float(item['avg_final_exec_per_sec'])}\t{item['exec_rank']}\t"
                      f"{item['overall_rank_score']}\t{item['overall_rank']}\n"
                  )

          summary_md = root / 'summary.md'
          ok = sum(1 for row in rows if row.get('status') == 'success')
          failed = len(rows) - ok
          with summary_md.open('w') as f:
              f.write('# Compare Long Fuzz Modes rust-bitcoin\n\n')
              f.write(f"- target count: `{len({row.get('target') for row in rows}) if rows else 0}`\n")
              f.write(f"- mode count: `{len({row.get('mode_id') for row in rows}) if rows else 0}`\n")
              f.write(f"- run count: `{len({row.get('run_index') for row in rows}) if rows else 0}`\n")
              f.write(f"- successful jobs: `{ok}`\n")
              f.write(f"- failed jobs: `{failed}`\n\n")
              f.write("- workflow conclusion policy: compare runs stay green when fuzz jobs observe failures; per-run `status` remains the source of truth.\n\n")
              if rows:
                  f.write(f"- tested commit: [`{rows[0].get('tested_commit','')}`]({rows[0].get('tested_commit_url','')})\n")
                  f.write(f"- corpus start mode: `{rows[0].get('corpus_start_mode','')}`\n")
                  f.write(f"- stop mode: `{rows[0].get('stop_mode','')}`\n")
                  f.write(f"- stop value: `{rows[0].get('stop_value','')}`\n")
                  seeds = [row.get('seed') for row in rows if row.get('seed') is not None]
                  if seeds:
                      f.write(f"- seed range: `{min(seeds)}..{max(seeds)}`\n\n")
                  else:
                      f.write("- seed range: random\n\n")
              if overview:
                  f.write('## Mode overview\n\n')
                  f.write('| target | mode | successful jobs | failed jobs | Avg job duration (s) | Avg fuzzing duration (s) | Avg `ft` | `ft` rank | Avg `cov` | `cov` rank | Avg corpus count | corpus rank | Avg `exec/s` | `exec/s` rank | Overall |\n')
                  f.write('| --- | --- | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: |\n')
                  for item in sorted(overview, key=lambda entry: (entry['target'], entry['overall_rank'], entry['mode_id'])):
                      f.write(
                          f"| `{item['target']}` | `{item['mode_id']}: {item['mode_name']}` | {item['successful_jobs']} | {item['failed_jobs']} | "
                          f"{fmt_float(item['avg_job_duration_s'])} | {fmt_float(item['avg_fuzz_duration_s'])} | "
                          f"{fmt_float(item['avg_final_ft'])} | {item['ft_rank']} | "
                          f"{fmt_float(item['avg_final_cov'])} | {item['cov_rank']} | "
                          f"{fmt_float(item['avg_final_corpus_count'])} | {item['corpus_rank']} | "
                          f"{fmt_float(item['avg_final_exec_per_sec'])} | {item['exec_rank']} | {item['overall_rank']} |\n"
                      )
                  f.write('\n')
              current_target = None
              current_run = None
              for row in rows:
                  target = row.get('target', '')
                  if target != current_target:
                      if current_target is not None:
                          f.write('\n')
                      current_target = target
                      current_run = None
                      f.write(f"## `{target}`\n")
                  run_index = row.get('run_index')
                  if run_index != current_run:
                      if current_run is not None:
                          f.write('\n')
                      current_run = run_index
                      f.write(f"\n### run `{run_index}` seed `{row.get('seed','')}`\n\n")
                      f.write('| mode | status | runs | cov | ft | corpus | exec/s | rss (MB) | Job duration (s) | Fuzzing duration (s) | rustflags |\n')
                      f.write('| --- | --- | ---: | ---: | ---: | --- | ---: | ---: | ---: | ---: | --- |\n')
                  corpus = row.get('final_corpus_count')
                  corpus_size = row.get('final_corpus_size')
                  if corpus is not None and corpus_size:
                      corpus = f"{corpus}/{corpus_size}"
                  f.write(
                      f"| `{row.get('mode_id','')}: {row.get('mode_name','')}` | `{row.get('status','')}` | "
                      f"{row.get('completed_runs','') or ''} | {row.get('final_cov','') or ''} | "
                      f"{row.get('final_ft','') or ''} | {corpus or ''} | "
                      f"{row.get('final_exec_per_sec','') or ''} | {row.get('final_rss_mb','') or ''} | {row.get('job_duration_s','')} | {row.get('fuzz_duration_s','') or ''} | "
                      f"`{row.get('rustflags') or 'none'}` |\n"
                  )

          print(summary_md.read_text())
          PY
      - name: Publish job summary
        run: cat long-fuzz-download/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload consolidated summary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: long-fuzz-compare-summary
          path: |
            long-fuzz-download/summary.md
            long-fuzz-download/summary.tsv
            long-fuzz-download/overview.tsv

  auto-promote-corpus:
    if: ${{ always() && github.repository == 'i-a-m-d/rust-bitcoin' && fromJSON(github.event.inputs.auto_promote_corpus || 'false') }}
    needs: [discover, fuzz, summarize]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger corpus promotion workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            repos/${{ github.repository }}/actions/workflows/long-fuzz-promote-corpus.yml/dispatches \
            -f ref='${{ github.ref_name }}' \
            -f inputs[compare_run_id]='${{ github.run_id }}' \
            -f inputs[targets]='${{ github.event.inputs.targets || 'bitcoin_arbitrary_psbt' }}' \
            -f inputs[branch_name]='${{ github.event.inputs.promotion_branch || 'fuzz-corpora' }}'
